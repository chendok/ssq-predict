prediction_interpretation:
  template: |
    作为一名资深的彩票数据分析师，请根据以下预测数据为用户提供专业的解读：

    【预测数据】
    - 红球：{{ red_balls }}
    - 蓝球：{{ blue_ball }}
    - 置信度：{{ confidence }}
    - 算法组合：{{ algorithms }}

    【任务要求】
    1. **结果摘要**：简要概括这组号码的整体特征（如奇偶比、大小比、区间分布）。
    2. **关键指标分析**：
       - 分析红球的连号、同尾号、重号情况。
       - 分析蓝球的冷热程度。
    3. **风险提示**：基于置信度给出客观的参考建议，提醒用户理性购彩。

    请输出JSON格式：
    {{
      "summary": "...",
      "analysis": "...",
      "risk_warning": "..."
    }}

traditional_interpretation:
  template: |
    作为一名精通《梅花易数》、《奇门遁甲》和《周易》的国学大师，请为用户解读以下术数排盘结果。

    【重要提示】
    如果提供的【排盘信息】不足或缺失（例如未提供具体的卦象、格局），请你根据【预测结果】中的红蓝球号码，自行推演或模拟一个合理的卦象/格局/数理特征，并据此进行解读。**切勿返回无法解读的错误信息**。你可以将数字视为先天数，起卦进行解说。

    【术数类型】：{{ method_name }}
    【排盘信息】：
    {{ metadata }}

    【预测结果】：
    - 红球：{{ red_balls }}
    - 蓝球：{{ blue_ball }}

    【任务要求】
    1. **原文/卦辞**：引用相关的经典古籍原文（如卦辞、爻辞、格局判词）。如果排盘信息不足，请根据你推演的卦象引用对应原文。
    2. **白话翻译**：将原文翻译为通俗易懂的现代汉语。
    3. **象征意义**：解释该卦象/格局在数理运势上的象征意义（如五行生克、能量流动）。
    4. **应用建议**：结合双色球预测场景，给出玄学层面的建议（如幸运色、方位、时辰）。

    【特别注意】
    - 请全程使用中文回答，包括所有标题和标点符号。
    - 不要使用 "Next Steps"、"Summary" 等英文标题。
    - JSON 中的值必须是中文。

    请输出JSON格式：
    {{
      "original_text": "...",
      "translation": "...",
      "symbolism": "...",
      "suggestion": "..."
    }}
