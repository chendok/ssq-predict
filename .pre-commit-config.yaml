repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        files: backend/

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: backend/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend Lint
        entry: powershell -Command "cd frontend; if (Test-Path node_modules) { npm run lint } else { Write-Warning 'Frontend node_modules missing, skipping lint' }"
        language: system
        types: [javascript, jsx, ts, tsx]
        pass_filenames: false
